<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>POLINIZADOR v3.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=National+Park:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://unpkg.com/p5.js-svg@1.5.1"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; display: flex;
            background: #1a1a1a;
            height: 100vh; overflow: hidden;
            color: white;
            font-family: 'National Park', monospace;
        }
        #sidebar {
            width: 300px;
            background: #1e1e1e;
            padding: 18px 16px 30px;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 7px;
            overflow-y: auto;
            z-index: 100;
        }
        h1 {
            font-size: 12px;
            border-bottom: 2px solid #fff;
            padding-bottom: 5px;
            font-family: monospace;
            margin: 0 0 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .group { display: flex; flex-direction: column; gap: 3px; }
        label {
            font-size: 9px;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 0.8px;
        }
        /* Fila slider + número editable */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .slider-row input[type="range"] {
            flex: 1;
            accent-color: #fff;
            padding: 0;
            background: none;
            border: none;
            cursor: pointer;
        }
        .num-input {
            width: 46px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #ddd;
            font-family: monospace;
            font-size: 10px;
            padding: 3px 5px;
            text-align: right;
            -moz-appearance: textfield;
        }
        .num-input::-webkit-inner-spin-button,
        .num-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .num-input:focus { outline: 1px solid #777; border-color: #777; }

        input[type="text"] {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 7px 8px;
            font-family: 'National Park', monospace;
            font-size: 14px;
            width: 100%;
            letter-spacing: 1px;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: #aaa;
        }
        input[type="checkbox"] { accent-color: #fff; width: 13px; height: 13px; }
        hr { border: 0; border-top: 1px solid #2c2c2c; margin: 5px 0; }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'National Park', monospace;
            font-size: 10px;
            letter-spacing: 0.5px;
            margin-top: 2px;
            transition: background 0.1s;
        }
        button:hover { background: #ddd; }
        button.secondary {
            background: #2a2a2a;
            color: #aaa;
            border: 1px solid #444;
        }
        button.secondary:hover { background: #333; color: #fff; }
        button.accent {
            background: #2255ee;
            color: #fff;
        }
        button.accent:hover { background: #3366ff; }
        button.toggle {
            background: #2a2a2a;
            color: #aaa;
            border: 1px solid #444;
        }
        button.toggle.active {
            background: #e8f000;
            color: #000;
            border-color: #e8f000;
        }
        button.toggle:hover { background: #333; color: #fff; }
        button.toggle.active:hover { background: #d4dc00; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>Polinizador v3.0</h1>

        <div class="group">
            <label>Palabra</label>
            <input type="text" id="inText" value="POLINIZADOS">
        </div>

        <hr>

        <div class="group">
            <label>Apertura (º)</label>
            <div class="slider-row">
                <input type="range" id="inAngle" min="5" max="360" value="90"
                    oninput="syncNum(this, 'nAngle')">
                <input type="number" class="num-input" id="nAngle" value="90"
                    oninput="syncSlider(this, 'inAngle')" min="5" max="360">
            </div>
        </div>

        <div class="group">
            <label>Hueco Central (rIn)</label>
            <div class="slider-row">
                <input type="range" id="inRin" min="0" max="1500" value="40"
                    oninput="syncNum(this, 'nRin')">
                <input type="number" class="num-input" id="nRin" value="40"
                    oninput="syncSlider(this, 'inRin')" min="0" max="1500">
            </div>
        </div>

        <div class="group">
            <label>Largo Spray (rOut)</label>
            <div class="slider-row">
                <input type="range" id="inRout" min="10" max="1500" value="400"
                    oninput="syncNum(this, 'nRout')">
                <input type="number" class="num-input" id="nRout" value="400"
                    oninput="syncSlider(this, 'inRout')" min="10" max="1500">
            </div>
        </div>

        <div class="group">
            <label>Caos / Jitter</label>
            <div class="slider-row">
                <input type="range" id="inJitter" min="0" max="300" value="50"
                    oninput="syncNum(this, 'nJitter')">
                <input type="number" class="num-input" id="nJitter" value="50"
                    oninput="syncSlider(this, 'inJitter')" min="0" max="300">
            </div>
        </div>

        <hr>

        <div class="group">
            <label>Grosor Maestro</label>
            <div class="slider-row">
                <input type="range" id="inWeight" min="0.5" max="12" step="0.5" value="1.5"
                    oninput="syncNum(this, 'nWeight')">
                <input type="number" class="num-input" id="nWeight" value="1.5"
                    oninput="syncSlider(this, 'inWeight')" min="0.5" max="12" step="0.5">
            </div>
        </div>

        <div class="group">
            <label>Punteado</label>
            <div class="slider-row">
                <input type="range" id="inDash" min="0" max="30" value="0"
                    oninput="syncNum(this, 'nDash')">
                <input type="number" class="num-input" id="nDash" value="0"
                    oninput="syncSlider(this, 'inDash')" min="0" max="30">
            </div>
        </div>

        <hr>

        <div class="row">
            <input type="checkbox" id="checkBalls" checked>
            <label style="color:#aaa;">Activar Bolitas</label>
        </div>

        <div class="group">
            <label>Tamaño Bolita</label>
            <div class="slider-row">
                <input type="range" id="inBallSize" min="10" max="150" value="45"
                    oninput="syncNum(this, 'nBallSize')">
                <input type="number" class="num-input" id="nBallSize" value="45"
                    oninput="syncSlider(this, 'inBallSize')" min="10" max="150">
            </div>
        </div>

        <div class="group">
            <label>Padding Letra</label>
            <div class="slider-row">
                <input type="range" id="inLetterPadding" min="0" max="100" value="20"
                    oninput="syncNum(this, 'nLetterPadding')">
                <input type="number" class="num-input" id="nLetterPadding" value="20"
                    oninput="syncSlider(this, 'inLetterPadding')" min="0" max="100">
            </div>
        </div>

        <hr>

        <button class="accent" onclick="randomizeLayout()">⚄ Randomize</button>
        <button class="toggle" id="btnReverse" onclick="toggleReverse()">← Der a Izq</button>
        <button onclick="saveSVG()">↓ Exportar SVG</button>
        <button class="secondary" onclick="resetRotation()">↺ Reset Rotación</button>
    </div>

    <div id="canvas-parent" style="flex-grow:1; background:#fff;"></div>
    <script src="sketch.js"></script>
    <script>
        // Sincroniza slider → número
        function syncNum(slider, numId) {
            document.getElementById(numId).value = slider.value;
        }
        // Sincroniza número → slider (clamp al rango)
        function syncSlider(numInput, sliderId) {
            let slider = document.getElementById(sliderId);
            let v = parseFloat(numInput.value);
            let mn = parseFloat(slider.min);
            let mx = parseFloat(slider.max);
            if (!isNaN(v)) {
                let clamped = Math.min(Math.max(v, mn), mx);
                slider.value = clamped;
                // No sobreescribir el input mientras el usuario escribe
            }
        }
    </script>
</body>
</html>
