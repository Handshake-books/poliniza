<style>

    <div class="sc-row"><kbd>C</kbd><span class="sc-desc">Centrar origen</span></div>

<script>
// ── VALORES FIJOS DE GRÁFICA ──────────────────────────────────────────────────
// En el modo juego el jitter es VIVO (se regenera mientras dispara)
const GFX = {
  angle     : 360,
  rIn       : 53,
  rOutBase  : 3000,
  jitter    : 83,
  dash      : 0,
  linePad   : 15,
  showBalls : true,
  ballStroke: true,
  colorBg   : '#14e069',
  colorFg   : '#8a8a8a',
  colorBall : '#000000',
  colorText : '#8a8a8a',
};

function syncSlider(sliderId, valId, val, suffix) {
  document.getElementById(valId).value = val + (suffix || '');
}
function syncFromVal(inputEl) {
  let raw = parseFloat(inputEl.value);
  if (isNaN(raw)) return;
  let grp    = inputEl.closest('.pgrp') || inputEl.closest('.plrow').parentElement;
  let slider = grp ? grp.querySelector('input[type="range"]') : null;
  if (!slider) return;
  raw = Math.min(Math.max(raw, parseFloat(slider.min)), parseFloat(slider.max));
  slider.value = raw;
  slider.dispatchEvent(new Event('input'));
}
</script>

<script>
// ── ESTADO GLOBAL ─────────────────────────────────────────────────────────────
const KEYS    = {};
let spaceDown = false;
let shotCount = 0;

window.addEventListener('keydown', e => {
  if (document.activeElement.tagName === 'INPUT' ||
      document.activeElement.tagName === 'SELECT') return;
  KEYS[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); spaceDown = true; }
  if (e.code === 'KeyC') centerOrigin();
  if (e.code === 'KeyX') clearStamps();
});

window.addEventListener('keyup', e => {
  KEYS[e.code] = false;
  if (e.code === 'Space') spaceDown = false;
});

document.addEventListener('mousemove', e => {
  let ch = document.getElementById('crosshair');
  ch.style.left = e.clientX + 'px';
  ch.style.top  = e.clientY + 'px';
});
</script>

<script>
// ── p5 SKETCH ─────────────────────────────────────────────────────────────────
const PANEL_W = 200;

let FONTS = [], currentFontIdx = 0, p5Font = null, otFont = null;
let fontLoadPromises = [];
let _tyCache = {};

let posX, posY;
let velX = 0, velY = 0;
let rotation = 0;
let aimAngle = 0;
let jitterSeed = 42;

let buf;
let stamps = [];
let wasFiring = false;

function preload() {}

function setup() {
  let cnv = createCanvas(windowWidth, windowHeight);
  cnv.parent(document.body);
  cnv.style('position', 'fixed');
  cnv.style('top', '0');
  cnv.style('left', '0');
  cnv.style('z-index', '1');

  posX = (width - PANEL_W) / 2;
  posY = height / 2;
  aimAngle = 0;

  buf = createGraphics(width, height);
  buf.clear();

  initFonts();
  frameRate(60);
}

async function initFonts() {
  try {
    let ff = new FontFace('1nationalpark', 'url(fonts/1nationalpark.ttf)');
    let loaded = await ff.load();
    document.fonts.add(loaded);
    p5Font = '1nationalpark';
    otFont = await opentype.load('fonts/1nationalpark.ttf').catch(() => null);
  } catch(e) {
    p5Font = 'sans-serif';
    otFont = null;
  }
}

function fontFam(idx) {
  return '1nationalpark';
}

// ── PARÁMETROS ────────────────────────────────────────────────────────────────
// Solo se leen del DOM los controles ajustables; el resto viene de GFX.
function getP() {
  return {
    txt       : (document.getElementById('inText').value || 'A').toUpperCase(),
    angle     : radians(GFX.angle),
    rIn       : GFX.rIn,
    rOutBase  : GFX.rOutBase,
    jitter    : GFX.jitter,
    weight    : parseFloat(document.getElementById('inWeight').value),
    dash      : GFX.dash,
    showBalls : GFX.showBalls,
    ballSize  : parseInt(document.getElementById('inBallSize').value),
    fontSize  : parseInt(document.getElementById('inFontSize').value),
    linePad   : GFX.linePad,
    ballStroke: GFX.ballStroke,
    stampLines: document.getElementById('checkStampLines').checked,
    colorBg   : GFX.colorBg,
    colorFg   : GFX.colorFg,
    colorBall : GFX.colorBall,
    colorText : GFX.colorText,
    speed     : parseFloat(document.getElementById('inSpeed').value),
    friction  : parseFloat(document.getElementById('inFriction').value),
    aimLerp   : parseFloat(document.getElementById('inAimLerp').value),
  };
}

// ── COLISIÓN ──────────────────────────────────────────────────────────────────
function calcCollision(a, margin, ox, oy) {
  let dx = cos(a), dy = sin(a), t = Infinity;
  if (dx > 0) t = min(t, (width - PANEL_W - margin - ox) / dx);
  if (dx < 0) t = min(t, (margin - ox) / dx);
  if (dy > 0) t = min(t, (height - margin - oy) / dy);
  if (dy < 0) t = min(t, (margin - oy) / dy);
  return max(0, t);
}

// ── RAYOS ─────────────────────────────────────────────────────────────────────
function calcRays(p, ox, oy, rot) {
  let steps = p.txt.length;
  if (steps === 0) return [];
  let margin = p.showBalls
    ? (p.ballSize / 2 + p.weight + p.linePad)
    : (p.weight * 2 + 10 + p.linePad);
  randomSeed(jitterSeed);
  let jv = Array.from({length: steps}, () => random(-p.jitter, p.jitter));
  return jv.map((jit, i) => {
    let theta = steps > 1 ? map(i, 0, steps - 1, -p.angle / 2, p.angle / 2) : 0;
    let fa    = theta + rot;
    let rMax  = calcCollision(fa, margin, ox, oy);
    let rLine = min(p.rOutBase + jit, rMax);
    let rBMax = calcCollision(fa, p.showBalls ? p.ballSize / 2 + p.weight : p.weight + 4, ox, oy);
    let rBall = min(rLine + p.linePad, rBMax);
    return {
      fa, rIn: p.rIn, rLine, rBall,
      lx: ox + cos(fa) * rBall,
      ly: oy + sin(fa) * rBall,
      letter: p.txt[i],
      ox, oy,
    };
  });
}

// ── OFFSET TIPOGRÁFICO ────────────────────────────────────────────────────────
function typoOffset(fontSize) {
  if (!FONTS.length) return fontSize * 0.18;
  let key = currentFontIdx + '_' + fontSize;
  if (_tyCache[key] !== undefined) return _tyCache[key];
  let oc = document.createElement('canvas');
  oc.width = oc.height = Math.ceil(fontSize * 2);
  let ctx = oc.getContext('2d');
  ctx.font = `${fontSize}px "${fontFam(currentFontIdx)}"`;
  let cap = ctx.measureText('H').actualBoundingBoxAscent || fontSize * 0.7;
  _tyCache[key] = cap / 2;
  return cap / 2;
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  let p = getP();

  // Física
  let accel  = p.speed * 0.45;
  let maxSpd = p.speed * 3.5;

  if (KEYS['KeyW'] || KEYS['ArrowUp'])    velY -= accel;
  if (KEYS['KeyS'] || KEYS['ArrowDown'])  velY += accel;
  if (KEYS['KeyA'] || KEYS['ArrowLeft'])  velX -= accel;
  if (KEYS['KeyD'] || KEYS['ArrowRight']) velX += accel;

  velX *= p.friction;
  velY *= p.friction;

  let spd = sqrt(velX * velX + velY * velY);
  if (spd > maxSpd) { velX = velX / spd * maxSpd; velY = velY / spd * maxSpd; }

  posX = constrain(posX + velX, 12, width - PANEL_W - 12);
  posY = constrain(posY + velY, 12, height - 12);

  // Apuntado
  let targetAngle = atan2(mouseY - posY, mouseX - posX);
  let diff = targetAngle - aimAngle;
  while (diff >  PI) diff -= TWO_PI;
  while (diff < -PI) diff += TWO_PI;
  aimAngle  += diff * p.aimLerp;
  rotation   = aimAngle;

  // Estado disparo
  let isFiring = spaceDown && p5Font;

  // Stamp al soltar
  if (wasFiring && !isFiring && p5Font) {
    stampSpray(p);
  }
  wasFiring = isFiring;

  // HUD
  let status = document.getElementById('hud-status');
  let hint   = document.getElementById('spacebar-hint');
  if (isFiring) {
    status.textContent = '● DISPARANDO';
    status.classList.add('firing');
    hint.classList.add('active');
  } else {
    status.textContent = 'EN ESPERA';
    status.classList.remove('firing');
    hint.classList.remove('active');
  }

  // Render
  background(p.colorBg);
  image(buf, 0, 0);

  if (isFiring) {
    let rays = calcRays(p, posX, posY, rotation);
    let tyo  = typoOffset(p.fontSize);
    rays.forEach(r => drawMolecule(r, p, tyo));
  }

  drawPlayer(isFiring, p);
}

// ── MARCADOR DEL JUGADOR ──────────────────────────────────────────────────────
function drawPlayer(isFiring, p) {
  push();
  translate(posX, posY);
  rotate(aimAngle);

  let speed = sqrt(velX * velX + velY * velY);

  if (isFiring) {
    noFill();
    stroke(255, 255, 255, 18);
    strokeWeight(8);
    ellipse(0, 0, 28, 28);
    stroke(255, 255, 255, 10);
    strokeWeight(16);
    ellipse(0, 0, 36, 36);
  }

  let col = isFiring ? color(255, 255, 255) : color(200, 200, 200);
  fill(red(col), green(col), blue(col), isFiring ? 230 : 140);
  stroke(255, 255, 255, isFiring ? 255 : 160);
  strokeWeight(0.8);
  beginShape();
    vertex( 9,  0);
    vertex(-6,  5);
    vertex(-3,  0);
    vertex(-6, -5);
  endShape(CLOSE);

  noStroke();
  fill(255, 255, 255, isFiring ? 255 : 180);
  ellipse(0, 0, 2.5, 2.5);

  if (!isFiring) {
    let dist_ = dist(posX, posY, mouseX, mouseY);
    stroke(255, 255, 255, 25);
    strokeWeight(0.5);
    drawingContext.setLineDash([3, 6]);
    line(10, 0, min(dist_, 80), 0);
    drawingContext.setLineDash([]);
  }

  if (speed > 1.5) {
    let trailLen = map(speed, 0, 20, 0, 18);
    stroke(255, 255, 255, map(speed, 0, 20, 0, 60));
    strokeWeight(0.8);
    drawingContext.setLineDash([2, 3]);
    line(-6, 0, -6 - trailLen, 0);
    drawingContext.setLineDash([]);
  }

  pop();
}

// ── DIBUJAR UNA MOLÉCULA ──────────────────────────────────────────────────────
function drawMolecule(r, p, tyo) {
  push();
  translate(r.ox, r.oy);
  rotate(r.fa);
  stroke(p.colorFg); strokeWeight(p.weight); strokeCap(ROUND); noFill();
  drawingContext.setLineDash([]);
  drawingContext.lineDashOffset = 0;
  line(r.rIn, 0, r.rLine, 0);
  pop();

  push();
  translate(r.lx, r.ly);
  if (p.showBalls) {
    fill(p.colorBall);
    if (p.ballStroke) { stroke(p.colorFg); strokeWeight(p.weight); } else noStroke();
    ellipse(0, 0, p.ballSize, p.ballSize);
  }
  noStroke();
  drawingContext.font           = `${p.fontSize}px "${p5Font || 'sans-serif'}"`;
  drawingContext.textAlign      = 'center';
  drawingContext.textBaseline   = 'middle';
  drawingContext.fillStyle      = p.colorText;
  drawingContext.fillText(r.letter, 0, 0);
  pop();
}

// ── STAMP ─────────────────────────────────────────────────────────────────────
function stampSpray(p) {
  let rays = calcRays(p, posX, posY, rotation);
  if (!rays.length) return;
  rays.forEach(r => {
    if (p.stampLines) {
      buf.push();
      buf.translate(r.ox, r.oy);
      buf.rotate(r.fa);
      buf.stroke(p.colorFg); buf.strokeWeight(p.weight); buf.noFill();
      buf.drawingContext.setLineDash([]);
      buf.drawingContext.lineDashOffset = 0;
      buf.line(r.rIn, 0, r.rLine, 0);
      buf.pop();
    }

    buf.push();
    buf.translate(r.lx, r.ly);
    if (p.showBalls) {
      buf.fill(p.colorBall);
      if (p.ballStroke) { buf.stroke(p.colorFg); buf.strokeWeight(p.weight); } else buf.noStroke();
      buf.ellipse(0, 0, p.ballSize, p.ballSize);
    }
    buf.noStroke();
    buf.drawingContext.font         = `${p.fontSize}px "${p5Font || 'sans-serif'}"`;
    buf.drawingContext.textAlign    = 'center';
    buf.drawingContext.textBaseline = 'middle';
    buf.drawingContext.fillStyle    = p.colorText;
    buf.drawingContext.fillText(r.letter, 0, 0);
    buf.pop();
  });

  stamps.push({ rays: rays.map(r => ({...r})), p: {...p} });
  shotCount++;
  document.getElementById('hud-shots').textContent = 'disparos: ' + shotCount;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function clearStamps(reset) {
  stamps = []; shotCount = 0;
  buf.clear();
  document.getElementById('hud-shots').textContent = 'disparos: 0';
  if (reset) {
    posX = (width - PANEL_W) / 2; posY = height / 2;
    velX = velY = 0; rotation = aimAngle = 0; jitterSeed = 42;
  }
}

function centerOrigin() {
  posX = (width - PANEL_W) / 2; posY = height / 2;
  velX = velY = 0;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  let old = buf;
  buf = createGraphics(width, height);
  buf.clear();
  stamps.forEach(s => {
    let p = s.p;
    s.rays.forEach(r => {
      if (p.stampLines) {
        buf.push(); buf.translate(r.ox, r.oy); buf.rotate(r.fa);
        buf.stroke(p.colorFg); buf.strokeWeight(p.weight); buf.noFill();
        buf.drawingContext.setLineDash([]);
        buf.line(r.rIn, 0, r.rLine, 0);
        buf.pop();
      }
      buf.push(); buf.translate(r.lx, r.ly);
      if (p.showBalls) {
        buf.fill(p.colorBall);
        if (p.ballStroke) { buf.stroke(p.colorFg); buf.strokeWeight(p.weight); } else buf.noStroke();
        buf.ellipse(0, 0, p.ballSize, p.ballSize);
      }
      buf.noStroke();
      buf.drawingContext.font         = `${p.fontSize}px "${p5Font || 'sans-serif'}"`;
      buf.drawingContext.textAlign    = 'center';
      buf.drawingContext.textBaseline = 'middle';
      buf.drawingContext.fillStyle    = p.colorText;
      buf.drawingContext.fillText(r.letter, 0, 0);
      buf.pop();
    });
  });
  old.remove();
}
</script>
